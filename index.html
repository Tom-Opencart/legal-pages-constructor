<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Pages Constructor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header__left">
                <button id="settingsBtn">⚙️</button>
                <h1 class="header__title">Legal Pages Constructor</h1>
            </div>
            <div class="header__right">
                <button id="helpBtn">? Справка</button>
            </div>
        </header>
        
        <div class="main">
            <aside class="sidebar">
                <nav id="docTabs">
                    <button class="sidebar__tab sidebar__tab--active" data-doc="offer">ОФЕРТА</button>
                    <button class="sidebar__tab" data-doc="policy">ПДН</button>
                    <button class="sidebar__tab" data-doc="consent">СОГЛАСИЕ</button>
                    <button class="sidebar__tab" data-doc="cookie">COOKIE</button>
                </nav>
                <div class="sidebar__actions">
                    <button id="copyBtn">📋 Копировать HTML</button>
                    <button id="donateBtn">☕ Донаты</button>
                </div>
            </aside>
            
            <main class="editor">
                <h2 id="editorTitle">Публичная оферта</h2>
                <div id="editor" contenteditable></div>
            </main>
        </div>
    </div>
    
    <div id="settingsModal" class="modal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2>Настройки магазина</h2>
                <button class="modal__close">×</button>
            </div>
            <div class="modal__body">
                <form id="settingsForm">
                    <div class="form-group">
                        <label for="owner_type">Тип собственника</label>
                        <select id="owner_type" name="owner_type">
                            <option value="ИП">ИП</option>
                            <option value="ООО">ООО</option>
                            <option value="Самозанятый">Самозанятый</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="full_name">Полное наименование</label>
                        <input type="text" id="full_name" name="full_name">
                    </div>
                    
                    <div class="form-group">
                        <label for="inn">ИНН</label>
                        <input type="text" id="inn" name="inn">
                    </div>
                    
                    <div class="form-group">
                        <label for="ogrn">ОГРН</label>
                        <input type="text" id="ogrn" name="ogrn">
                    </div>
                    
                    <div class="form-group">
                        <label for="legal_address">Юридический адрес</label>
                        <input type="text" id="legal_address" name="legal_address">
                    </div>
                    
                    <div class="form-group">
                        <label for="actual_address">Фактический адрес</label>
                        <input type="text" id="actual_address" name="actual_address">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="email_consent">Email для согласий</label>
                        <input type="email" id="email_consent" name="email_consent">
                    </div>
                    
                    <div class="form-group">
                        <label for="site_name">Название сайта</label>
                        <input type="text" id="site_name" name="site_name">
                    </div>
                    
                    <h3>Банковские реквизиты</h3>
                    
                    <div class="form-group">
                        <label for="bank_name">Наименование банка</label>
                        <input type="text" id="bank_name" name="bank_name">
                    </div>
                    
                    <div class="form-group">
                        <label for="bik">БИК</label>
                        <input type="text" id="bik" name="bik">
                    </div>
                    
                    <div class="form-group">
                        <label for="corr_account">Корреспондентский счёт</label>
                        <input type="text" id="corr_account" name="corr_account">
                    </div>
                    
                    <div class="form-group">
                        <label for="reg_account">Расчётный счёт</label>
                        <input type="text" id="reg_account" name="reg_account">
                    </div>
                </form>
            </div>
            <div class="modal__footer">
                <button id="settingsSave">Сохранить и начать</button>
            </div>
        </div>
    </div>
    
    <div id="donateModal" class="modal modal--small">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2>Поддержать проект</h2>
                <button class="modal__close">×</button>
            </div>
            <div class="modal__body">
                <p>Если конструктор вам помог, вы можете поддержать проект:</p>
                <div class="donate-details">
                    <p><strong>Тинькофф:</strong> 2200 0000 0000 0000</p>
                    <p><strong>Сбербанк:</strong> 4081 7810 1000 0000 0000</p>
                </div>
            </div>
            <div class="modal__footer">
                <button class="donate-close">Закрыть</button>
            </div>
        </div>
    </div>
    
    <div id="toast">
        <span id="toastText"></span>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/documents.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
