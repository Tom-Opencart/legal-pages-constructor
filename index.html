<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Конструктор юридических документов для интернет-магазинов на OpenCart">
  <title>Legal Pages Constructor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header__left">
        <button class="btn btn--icon" id="settingsBtn" title="Настройки">⚙️</button>
        <h1 class="header__title">Legal Pages Constructor</h1>
      </div>
      <div class="header__right">
        <button class="btn btn--ghost" id="helpBtn">? Справка</button>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <nav class="sidebar__nav" id="docTabs">
          <button class="sidebar__tab sidebar__tab--active" data-doc="offer">ОФЕРТА</button>
          <button class="sidebar__tab" data-doc="policy">ПДН</button>
          <button class="sidebar__tab" data-doc="consent">СОГЛАСИЕ</button>
          <button class="sidebar__tab" data-doc="cookie">COOKIE</button>
        </nav>
        <div class="sidebar__actions">
          <button class="btn btn--primary btn--block" id="copyBtn">📋 Копировать HTML</button>
          <button class="btn btn--ghost btn--block" id="donateBtn">☕ Донаты</button>
        </div>
      </aside>

      <main class="editor">
        <h2 class="editor__title" id="editorTitle">Публичная оферта</h2>
        <div class="editor__content" id="editor" contenteditable="true"></div>
      </main>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Настройки магазина</h2>
        <button class="modal__close" id="settingsClose">✕</button>
      </div>
      <div class="modal__body">
        <form id="settingsForm">
          <div class="form-group">
            <label class="form-label">Тип собственника</label>
            <select class="form-input" name="owner_type">
              <option value="ИП">ИП</option>
              <option value="ООО">ООО</option>
              <option value="Самозанятый">Самозанятый</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">ФИО / Название организации</label>
            <input class="form-input" type="text" name="full_name" placeholder="Иванов Иван Иванович">
          </div>
          <div class="form-group">
            <label class="form-label">ИНН</label>
            <input class="form-input" type="text" name="inn" placeholder="212408956567">
          </div>
          <div class="form-group">
            <label class="form-label">ОГРНИП / ОГРН</label>
            <input class="form-input" type="text" name="ogrn" placeholder="318213000027412">
          </div>
          <div class="form-group">
            <label class="form-label">Юридический адрес</label>
            <input class="form-input" type="text" name="legal_address" placeholder="г. Москва, ул. Примерная, д. 1">
          </div>
          <div class="form-group">
            <label class="form-label">Фактический адрес</label>
            <input class="form-input" type="text" name="actual_address" placeholder="г. Москва, ул. Примерная, д. 1">
          </div>
          <div class="form-group">
            <label class="form-label">Телефон</label>
            <input class="form-input" type="tel" name="phone" placeholder="+7 (999) 123-45-67">
          </div>
          <div class="form-group">
            <label class="form-label">Email для связи</label>
            <input class="form-input" type="email" name="email" placeholder="info@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Email для отзыва согласия</label>
            <input class="form-input" type="email" name="email_consent" placeholder="info@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Название сайта (домен)</label>
            <input class="form-input" type="text" name="site_name" placeholder="example.ru">
          </div>

          <h3 class="form-section-title">Банковские реквизиты</h3>
          <div class="form-group">
            <label class="form-label">Наименование банка</label>
            <input class="form-input" type="text" name="bank_name" placeholder='АО "Альфа-Банк"'>
          </div>
          <div class="form-group">
            <label class="form-label">БИК</label>
            <input class="form-input" type="text" name="bik" placeholder="042202824">
          </div>
          <div class="form-group">
            <label class="form-label">Корр/счёт</label>
            <input class="form-input" type="text" name="corr_account" placeholder="30101810200000000824">
          </div>
          <div class="form-group">
            <label class="form-label">Расчётный счёт</label>
            <input class="form-input" type="text" name="reg_account" placeholder="40802810229040009656">
          </div>
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--primary" id="settingsSave">Сохранить и начать</button>
      </div>
    </div>
  </div>

  <!-- Donate Modal -->
  <div class="modal" id="donateModal">
    <div class="modal__overlay"></div>
    <div class="modal__content modal__content--small">
      <div class="modal__header">
        <h2 class="modal__title">Поддержать проект</h2>
        <button class="modal__close" id="donateClose">✕</button>
      </div>
      <div class="modal__body">
        <p class="donate__text">Если конструктор сэкономил ваше время — можете отблагодарить автора:</p>
        <div class="donate__details">
          <div class="donate__item">
            <span class="donate__label">ЮMoney:</span>
            <code class="donate__value">4100112176183832</code>
          </div>
          <div class="donate__item">
            <span class="donate__label">Карта:</span>
            <code class="donate__value">5599 0021 3241 5086</code>
          </div>
          <div class="donate__item">
            <span class="donate__label">PayPal:</span>
            <code class="donate__value">tomopencart@gmail.com</code>
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="donateCloseBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast__text" id="toastText"></span>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/documents.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
